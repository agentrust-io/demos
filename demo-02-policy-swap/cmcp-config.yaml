attestation:
  provider: auto
  enforcement_mode: enforcing
  validity_seconds: 3600

# policy_bundle_path is set via CMCP_POLICY_BUNDLE_PATH env var in the demo
# so we can swap between policies-v1 and policies-v2 without editing this file
policy_bundle_path: ./policies-v1/
catalog_path: ./catalog.json
listen_addr: "127.0.0.1:8443"
audit_db_path: ./audit.db
